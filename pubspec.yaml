name: exam_preparation
description: A complete, production-ready Exam Preparation mobile app built with Flutter and Supabase.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.6.0
  provider: ^6.1.2
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4
  pdf: ^3.11.1
  printing: ^5.13.2
  share_plus: ^10.1.0
  file_picker: ^10.3.3
  intl: ^0.19.0
  path_provider: ^2.1.3
  google_sign_in: ^6.2.1
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

